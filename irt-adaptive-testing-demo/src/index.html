<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <style>
    table {
      border-collapse: collapse;
    }

    th,
    td {
      border: 2px solid gray;
      padding: 5px;
      text-align: center;
    }

    .correct {}

    .wrong {
      background: #F4B183;
      color: #8B0000;
    }
  </style>
</head>

<body>
  <form id="exam-box" class="container">
    <div id="question-area" class="bg-light p-4 m-2 rounded border"></div>
    <div id="choice-area"></div>

    <div class="d-flex justify-content-between mt-4">
      <button id="back-btn" type="button" class="btn btn-secondary">前の問題へ</button>
      <input class="btn btn-primary" type="submit" value="次の問題へ">
    </div>
  </form>
  <script src="1_functions.js"></script>
  <script src="3_functions.js"></script>
</body>

</html>
